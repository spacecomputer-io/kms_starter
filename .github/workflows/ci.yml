name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test (e2e against anvil + mocked KMS)
        run: bun test

      - name: Build (Next.js)
        run: bun run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x
      - name: Install
        run: bun install --frozen-lockfile
      # Don't fail CI on audit findings — surface them in the run log.
      # Tighten to `bun audit --prod --error-on-vulnerabilities high` once
      # the postcss-via-next finding is upstream-fixed.
      - name: Audit
        run: bun audit || true
